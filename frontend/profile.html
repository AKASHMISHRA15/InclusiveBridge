<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>InclusiveBridge | Profile</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',sans-serif; }
body { min-height:100vh; background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a); color:#f8fafc; }
.navbar { display:flex; justify-content:space-between; align-items:center; padding:18px 36px; border-bottom:1px solid rgba(56,189,248,0.15); background:rgba(15,23,42,0.82); backdrop-filter:blur(8px); }
.navbar h1 { color:#38bdf8; font-size:1.25rem; }
.btn { border:none; border-radius:10px; padding:10px 18px; cursor:pointer; font-weight:700; text-decoration:none; color:white; background:linear-gradient(135deg,#38bdf8,#6366f1); display:inline-flex; justify-content:center; }
.btn.secondary { background:transparent; color:#38bdf8; border:1px solid rgba(56,189,248,0.35); }
.page { max-width:1120px; margin:0 auto; padding:34px 20px 56px; }
.layout { display:grid; grid-template-columns:320px 1fr; gap:20px; align-items:start; }
.panel { background:rgba(30,41,59,0.86); border:1px solid rgba(56,189,248,0.18); border-radius:14px; padding:24px; box-shadow:0 18px 50px rgba(0,0,0,0.22); }
.identity { text-align:center; }
.avatar { width:84px; height:84px; margin:0 auto 12px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#0f172a; font-size:2rem; font-weight:900; background:linear-gradient(135deg,#38bdf8,#a78bfa); }
.role-pill { display:inline-flex; margin:8px 0 22px; padding:6px 12px; border-radius:999px; background:rgba(56,189,248,0.1); color:#7dd3fc; border:1px solid rgba(56,189,248,0.25); font-size:0.78rem; font-weight:800; text-transform:uppercase; letter-spacing:0.6px; }
.field-list { display:flex; flex-direction:column; gap:10px; text-align:left; }
.item { background:#0f172a; border:1px solid rgba(56,189,248,0.12); border-radius:10px; padding:12px 14px; }
.label { color:#64748b; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:5px; }
.value { color:#e2e8f0; font-weight:700; overflow-wrap:anywhere; }
.edit-form { display:none; margin-top:16px; text-align:left; border-top:1px solid rgba(56,189,248,0.14); padding-top:16px; }
.edit-form.visible { display:block; }
input { width:100%; padding:11px 13px; border-radius:9px; border:1px solid rgba(56,189,248,0.2); background:#0f172a; color:white; outline:none; margin:6px 0 12px; font-size:0.95rem; }
input:focus { border-color:#38bdf8; box-shadow:0 0 0 3px rgba(56,189,248,0.1); }
.section-head { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:16px; }
.section-head h2 { font-size:1.45rem; }
.dash-list { display:flex; flex-direction:column; gap:12px; }
.dash-card { background:#0f172a; border:1px solid rgba(56,189,248,0.14); border-radius:12px; padding:18px; }
.dash-top { display:flex; justify-content:space-between; gap:16px; margin-bottom:14px; }
.dash-title { color:#f8fafc; font-weight:800; }
.dash-date { color:#94a3b8; font-size:0.82rem; text-align:right; }
.mini-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:12px; }
.mini { background:rgba(30,41,59,0.76); border-radius:9px; padding:10px; border:1px solid rgba(56,189,248,0.1); }
.alerts { color:#cbd5e1; font-size:0.88rem; line-height:1.5; }
.empty { padding:28px; text-align:center; color:#94a3b8; border:1px dashed rgba(56,189,248,0.24); border-radius:12px; background:rgba(15,23,42,0.45); }
.toast { display:none; position:fixed; right:20px; top:78px; max-width:320px; padding:14px 16px; border-radius:12px; background:#0f172a; border:1px solid rgba(56,189,248,0.3); color:#cbd5e1; box-shadow:0 16px 40px rgba(0,0,0,0.35); }
.toast.visible { display:block; }
@media (max-width:900px) {
    .navbar { padding:16px 18px; }
    .layout { grid-template-columns:1fr; }
    .mini-grid { grid-template-columns:1fr 1fr; }
    .dash-top { flex-direction:column; }
    .dash-date { text-align:left; }
}
</style>
</head>
<body>
<nav class="navbar">
    <h1>InclusiveBridge <span style="color:#64748b;font-size:0.75rem;">Profile</span></h1>
    <a href="/" class="btn secondary">Back to home</a>
</nav>
<div id="toast" class="toast"></div>
<main class="page">
    <div class="layout">
        <aside class="panel identity">
            <div class="avatar" id="avatar">?</div>
            <h2 id="profile-name">Loading...</h2>
            <div class="role-pill" id="profile-label">Profile</div>
            <div class="field-list" id="profile-fields"></div>
            <button class="btn" style="width:100%;margin-top:16px;" onclick="toggleEdit()">Update profile</button>
            <form class="edit-form" id="edit-form" onsubmit="saveProfile(event)">
                <label class="label" for="edit-age">Age</label>
                <input id="edit-age" type="number" min="1" max="120">
                <label class="label" for="edit-phone">Phone Number</label>
                <input id="edit-phone" type="tel" placeholder="e.g. +1234567890">
                <div id="role-edit-wrap">
                    <label class="label" for="edit-role">Role / job position</label>
                    <input id="edit-role" placeholder="e.g. Nurse, Doctor, Caregiver">
                </div>
                <button class="btn" type="submit" style="width:100%;">Save changes</button>
            </form>
        </aside>
        <section class="panel">
            <div class="section-head">
                <h2>Dashboard history</h2>
                <span class="muted" id="dashboard-count" style="color:#94a3b8;"></span>
            </div>
            <div class="dash-list" id="dash-list">
                <div class="empty">Loading dashboards...</div>
            </div>
        </section>
    </div>
</main>
<script>
let currentProfile = null;
function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[ch]));
}
function fmtDate(value) {
    if (!value) return 'Not recorded';
    const d = new Date(value);
    return Number.isNaN(d.getTime()) ? value : d.toLocaleString();
}
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('visible');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('visible'), 3200);
}
function initials(name) {
    return (name || '?').split(' ').filter(Boolean).map(part => part[0]).join('').slice(0,2).toUpperCase() || '?';
}
function renderProfile(user, label) {
    currentProfile = user;
    document.getElementById('avatar').textContent = initials(user.name);
    document.getElementById('profile-name').textContent = user.name || 'InclusiveBridge user';
    document.getElementById('profile-label').textContent = label;
    document.getElementById('edit-age').value = user.age || '';
    document.getElementById('edit-phone').value = user.phone || '';
    document.getElementById('edit-role').value = user.job_position || '';
    document.getElementById('role-edit-wrap').style.display = user.role === 'professional' ? 'block' : 'none';
    const rows = [
        ['Name', user.name],
        ['Age', user.age || 'Not provided'],
        ['Gender', user.gender || 'Not provided'],
        ['Email', user.email],
        ['Phone Number', user.phone || 'Not provided'],
    ];
    if (user.role === 'professional') {
        rows.push(['Role / job position', user.job_position || 'Not provided']);
        rows.push(['ID', user.caregiver_id || user.id]);
    }
    document.getElementById('profile-fields').innerHTML = rows.map(([labelText, value]) =>
        `<div class="item"><div class="label">${esc(labelText)}</div><div class="value">${esc(value)}</div></div>`
    ).join('');
}
function renderDashboards(dashboards) {
    document.getElementById('dashboard-count').textContent = `${dashboards.length} saved`;
    if (!dashboards.length) {
        document.getElementById('dash-list').innerHTML = '<div class="empty">Completed session dashboards will appear here.</div>';
        return;
    }
    document.getElementById('dash-list').innerHTML = dashboards.map(d => {
        const alerts = (d.top_alerts || []).length
            ? d.top_alerts.map(a => `${esc(a.type)} (${a.count})`).join(', ')
            : 'No system alerts recorded';
        return `<article class="dash-card">
            <div class="dash-top">
                <div>
                    <div class="dash-title">${esc(d.patient_name || 'Patient')} - ${esc(d.session_name || d.session_id)}</div>
                    <div class="alerts">${esc(d.disease || 'No disease or condition provided')}</div>
                </div>
                <div class="dash-date">Ended ${esc(fmtDate(d.session_ended_at))}</div>
            </div>
            <div class="mini-grid">
                <div class="mini"><div class="label">Age</div><div class="value">${esc(d.age || 'N/A')}</div></div>
                <div class="mini"><div class="label">Gender</div><div class="value">${esc(d.gender || 'N/A')}</div></div>
                <div class="mini"><div class="label">Messages</div><div class="value">${d.total_messages || 0}</div></div>
                <div class="mini"><div class="label">Alerts</div><div class="value">${d.total_alerts || 0}</div></div>
            </div>
            <div class="alerts"><strong>Top alerts:</strong> ${alerts}</div>
            <div class="alerts"><strong>Created:</strong> ${esc(fmtDate(d.session_created_at))}</div>
        </article>`;
    }).join('');
}
function toggleEdit() {
    document.getElementById('edit-form').classList.toggle('visible');
}
async function saveProfile(event) {
    event.preventDefault();
    const res = await fetch('/api/profile', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            age: document.getElementById('edit-age').value,
            phone: document.getElementById('edit-phone').value.trim(),
            job_position: document.getElementById('edit-role').value
        })
    });
    const data = await res.json();
    if (data.status !== 'ok') {
        showToast(data.message || 'Could not update profile.');
        return;
    }
    renderProfile(data.user, data.user.role === 'professional' ? 'Professional' : 'Home user');
    document.getElementById('edit-form').classList.remove('visible');
    showToast('Profile updated.');
}
fetch('/api/profile')
    .then(r => r.json())
    .then(data => {
        if (data.status !== 'ok') throw new Error(data.message);
        renderProfile(data.user, data.label);
        renderDashboards(data.dashboards || []);
    })
    .catch(() => {
        document.getElementById('profile-name').textContent = 'Profile unavailable';
        document.getElementById('dash-list').innerHTML = '<div class="empty">Could not load profile details.</div>';
    });
</script>
</body>
</html>
