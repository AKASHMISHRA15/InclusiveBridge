<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>InclusiveBridge | Session Dashboard</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',sans-serif; }
body {
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    color:#f8fafc;
}
.navbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 36px; border-bottom:1px solid rgba(56,189,248,0.15);
    background:rgba(15,23,42,0.82); backdrop-filter:blur(8px);
}
.navbar h1 { color:#38bdf8; font-size:1.25rem; }
.nav-actions { display:flex; gap:10px; }
.btn {
    border:none; border-radius:10px; padding:10px 18px; cursor:pointer;
    font-weight:700; text-decoration:none; display:inline-flex; align-items:center;
    justify-content:center; color:white; background:linear-gradient(135deg,#38bdf8,#6366f1);
}
.btn.secondary { background:transparent; color:#38bdf8; border:1px solid rgba(56,189,248,0.35); }
.page { max-width:1060px; margin:0 auto; padding:38px 20px 56px; }
.hero { margin-bottom:24px; }
.eyebrow { color:#38bdf8; font-size:0.78rem; text-transform:uppercase; letter-spacing:1px; font-weight:800; margin-bottom:8px; }
h2 { font-size:2rem; margin-bottom:8px; }
.muted { color:#94a3b8; line-height:1.5; }
.grid { display:grid; grid-template-columns:1.1fr 0.9fr; gap:18px; align-items:start; }
.panel {
    background:rgba(30,41,59,0.86); border:1px solid rgba(56,189,248,0.18);
    border-radius:14px; padding:24px; box-shadow:0 18px 50px rgba(0,0,0,0.22);
}
.panel h3 { color:#38bdf8; font-size:0.95rem; text-transform:uppercase; letter-spacing:0.7px; margin-bottom:16px; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.info {
    background:#0f172a; border:1px solid rgba(56,189,248,0.12);
    border-radius:10px; padding:14px;
}
.label { color:#64748b; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:6px; }
.value { color:#e2e8f0; font-weight:700; overflow-wrap:anywhere; }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
.stat { background:rgba(15,23,42,0.78); border:1px solid rgba(56,189,248,0.15); border-radius:12px; padding:18px; }
.stat .num { font-size:2rem; font-weight:800; color:#f8fafc; margin-bottom:4px; }
.alert-list { display:flex; flex-direction:column; gap:10px; }
.alert-row { display:flex; justify-content:space-between; gap:14px; background:#0f172a; border-radius:10px; padding:12px 14px; border:1px solid rgba(239,68,68,0.24); }
.alert-row span:first-child { color:#e2e8f0; }
.alert-row span:last-child { color:#fca5a5; font-weight:800; }
.empty { padding:28px; text-align:center; color:#94a3b8; border:1px dashed rgba(56,189,248,0.24); border-radius:12px; background:rgba(15,23,42,0.45); }
@media (max-width:820px) {
    .navbar { padding:16px 18px; align-items:flex-start; gap:14px; flex-direction:column; }
    .grid, .info-grid, .stats { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<nav class="navbar">
    <h1>InclusiveBridge <span style="color:#64748b;font-size:0.75rem;">Session dashboard</span></h1>
    <div class="nav-actions">
        <a class="btn secondary" href="/profile">Profile</a>
        <a class="btn" href="/">Go to home</a>
    </div>
</nav>

<main class="page">
    <section class="hero">
        <div class="eyebrow">Session completed</div>
        <h2 id="title">Dashboard created</h2>
        <p class="muted">A summary has been saved to your profile for quick review later.</p>
    </section>

    <div id="dashboard-content" class="empty">Loading dashboard...</div>
</main>

<script>
function fmtDate(value) {
    if (!value) return 'Not recorded';
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return value;
    return d.toLocaleString();
}
function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[ch]));
}
function renderDashboard(d) {
    if (!d) {
        document.getElementById('dashboard-content').outerHTML =
            '<div class="empty">No dashboard is available yet. Completed sessions will appear in your profile.</div>';
        return;
    }
    document.getElementById('title').textContent = `${d.patient_name || 'Patient'} session summary`;
    const alerts = (d.top_alerts || []).length
        ? d.top_alerts.map(a => `<div class="alert-row"><span>${esc(a.type)}</span><span>${a.count}</span></div>`).join('')
        : '<div class="empty">No system alerts were recorded for this session.</div>';
    document.getElementById('dashboard-content').outerHTML = `
        <div class="grid">
            <section class="panel">
                <h3>Patient information</h3>
                <div class="info-grid">
                    <div class="info"><div class="label">Session name / number</div><div class="value">${esc(d.session_name || d.session_id)}</div></div>
                    <div class="info"><div class="label">Name</div><div class="value">${esc(d.patient_name || 'Not provided')}</div></div>
                    <div class="info"><div class="label">Age</div><div class="value">${esc(d.age || 'Not provided')}</div></div>
                    <div class="info"><div class="label">Gender</div><div class="value">${esc(d.gender || 'Not provided')}</div></div>
                    <div class="info"><div class="label">Disease / condition</div><div class="value">${esc(d.disease || 'Not provided')}</div></div>
                    <div class="info"><div class="label">Session created</div><div class="value">${esc(fmtDate(d.session_created_at))}</div></div>
                    <div class="info"><div class="label">Session ended</div><div class="value">${esc(fmtDate(d.session_ended_at))}</div></div>
                </div>
            </section>
            <aside class="panel">
                <h3>Activity summary</h3>
                <div class="stats">
                    <div class="stat"><div class="num">${d.total_messages || 0}</div><div class="muted">Messages exchanged</div></div>
                    <div class="stat"><div class="num">${d.total_alerts || 0}</div><div class="muted">System alerts</div></div>
                </div>
                <h3>Most common alerts</h3>
                <div class="alert-list">${alerts}</div>
            </aside>
        </div>`;
}
fetch('/api/dashboard/latest')
    .then(r => r.json())
    .then(data => renderDashboard(data.dashboard))
    .catch(() => renderDashboard(null));
</script>
</body>
</html>
